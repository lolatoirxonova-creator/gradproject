[theme]
base = "light"
# Chiroyli — luxe beauty palette: warm cream + gold accent.
primaryColor = "#C19A3E"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#FAF6EC"
textColor = "#1A1714"
borderColor = "#ECE7DA"
linkColor = "#A07E2C"
baseRadius = "0.85rem"
buttonRadius = "2rem"
# Fraunces (editorial display serif) for headings, Inter for body/UI — loaded via
# the Google Fonts shorthand "{family}:{css_url}". Changing fonts needs a restart.
font = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
headingFont = "Fraunces:https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap"

[theme.sidebar]
backgroundColor = "#FBFAF7"
borderColor = "#ECE7E0"

[server]
headless = true
runOnSave = false
fileWatcherType = "none"
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false
