<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1240" viewBox="0 0 900 1240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#FBF3DE"/>
      <stop offset="1" stop-color="#EAD5A0"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.42" cy="0.4" r="0.62">
      <stop offset="0" stop-color="#E6C878"/>
      <stop offset="1" stop-color="#C19A3E"/>
    </radialGradient>
  </defs>

  <rect width="900" height="1240" fill="url(#bg)"/>

  <!-- editorial gold circle + thin outer ring -->
  <circle cx="470" cy="520" r="288" fill="url(#sun)"/>
  <circle cx="470" cy="520" r="350" fill="none" stroke="#C19A3E" stroke-opacity="0.20" stroke-width="2"/>

  <!-- minimalist serum dropper bottle (beauty motif), white line-art, centred -->
  <g stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- dropper cap + bulb -->
    <rect x="438" y="300" width="64" height="34" rx="8"/>
    <path d="M470 334 V360"/>
    <path d="M470 360 c -16 0 -16 22 0 22 c 16 0 16 -22 0 -22 Z" fill="#ffffff" fill-opacity="0.25"/>
    <!-- bottle body -->
    <path d="M408 470
             C 408 430, 532 430, 532 470
             L 532 720
             C 532 792, 408 792, 408 720 Z"
          fill="#ffffff" fill-opacity="0.30"/>
    <!-- neck -->
    <path d="M448 470 V440 H492 V470"/>
    <!-- liquid line -->
    <path d="M408 600 C 470 624, 470 576, 532 600" stroke-opacity="0.85"/>
  </g>
</svg>
